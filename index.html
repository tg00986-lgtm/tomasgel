<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: white;
            /* Asegúrate de que la imagen se llame exactamente así en tu carpeta */
            background-image: url('fondo scream.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 35px;
            border-radius: 15px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
            max-width: 90%;
        }

        h1 {
            font-size: 1.5rem;
            text-shadow: 2px 2px #ff0000;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        /* --- BOTONES AL LADO --- */
        .btn-group {
            display: flex;
            flex-direction: row; 
            gap: 25px;
            justify-content: center;
            align-items: center;
            min-height: 60px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #btn-si {
            background-color: #28a745;
            color: white;
            transition: transform 0.2s;
        }

        #btn-si:hover {
            transform: scale(1.1);
        }

        #btn-no {
            background-color: #dc3545;
            color: white;
            position: relative; /* Empieza en su sitio */
            z-index: 10;
        }

        /* Ventana con la info de la cita */
        #modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(10, 10, 10, 0.98);
            padding: 30px;
            border: 3px solid #ff0000;
            border-radius: 20px;
            z-index: 100;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 0 50px #ff0000;
        }

        .modal-content p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>¿Aceptarías celebrar tu cumple conmigo?</h1>
        <div class="btn-group">
            <button id="btn-si" onclick="mostrarMensaje()">SÍ</button>
            <button id="btn-no" onmouseover="moverBoton()" onclick="moverBoton()">NO</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 style="color: #ff0000; margin-top: 0;">¡muy bien¡</h2>
            <p><strong>Feliz cumpleaños amor</strong></p>
            <p>Te invito a estar los dos</p>
            <hr style="border: 0.5px solid #444;">
            <p> <strong>Fecha:</strong> 18 de marzo</p>
            <p> <strong>Hora:</strong> 2:20 PM</p>
            <p> <strong>Encuentro:</strong> Estación Hortúa</p>
            <p> <strong>Lugar Salida:</strong> Centro Mayor</p>
            <hr style="border: 0.5px solid #444;">
            <p>Te espero, no faltes. Te quiero mucho.</p>
            <p style="font-size: 1.3rem; margin-top: 15px; color: #ff0000;"><em>Att: Tomas</em></p>
            <button onclick="cerrarModal()" style="margin-top:20px; background:#333; color:white; padding: 10px 20px;">Cerrar</button>
        </div>
    </div>

    <script>
        function moverBoton() {
            const btnNo = document.getElementById('btn-no');
            
            // Al intentar tocarlo, se vuelve absoluto para escapar
            btnNo.style.position = 'absolute';
            
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        function mostrarMensaje() {
            document.getElementById('modal').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
